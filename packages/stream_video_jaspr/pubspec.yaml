name: stream_video_jaspr
description: Jaspr (web) UI components for Stream Video, built on top of the
  framework-agnostic stream_video client.
version: 0.0.1
publish_to: none

environment:
  sdk: ">=3.10.0 <4.0.0"

resolution: workspace

dependencies:
  dart_webrtc: ^1.5.3+hotfix.2
  jaspr: ^0.23.1
  stream_video: ^1.4.1
  universal_web: ^1.1.0
  webrtc_interface: ^1.5.1

dev_dependencies:
  build_runner: ^2.10.0
  jaspr_builder: ^0.23.1
  lints: ^6.0.0

jaspr:
  mode: client
