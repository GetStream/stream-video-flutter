name: stream_video
description: The Official Low-level Client for Stream Video, a service for
  building video calls, audio rooms, and live-streaming applications.
version: 1.4.1
homepage: https://getstream.io/video/
repository: https://github.com/GetStream/stream-video-flutter
issue_tracker: https://github.com/GetStream/stream-video-flutter/issues

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.1"

resolution: workspace

dependencies:
  async: ^2.12.0
  collection: ^1.19.1
  dart_webrtc: ^1.5.3+hotfix.2
  equatable: ^2.0.7
  fixnum: ^1.1.1
  http: ^1.1.0
  intl: ">=0.18.1 <=0.21.0"
  jose: ^0.3.4
  meta: ^1.16.0
  protobuf: ^6.0.0
  rxdart: ^0.28.0
  sdp_transform: ^0.3.2
  state_notifier: ^1.0.0
  synchronized: ^3.1.0
  tart: ^0.6.0
  uuid: ^4.5.1
  web: ^1.0.0
  web_socket_channel: ^3.0.3
  webrtc_interface: ^1.5.1

dev_dependencies:
  fake_async: ^1.3.1
  flutter_test:
    sdk: flutter
  mockito: ^5.4.2
  mocktail: ^1.0.0
  protoc_plugin: ^25.0.0
  pubspec_parse: ^1.2.1
  stream_webrtc_flutter: ^3.0.0

topics:
  - video
  - audio
  - audioroom
  - webrtc
  - livestream
